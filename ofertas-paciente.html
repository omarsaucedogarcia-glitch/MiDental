<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiDental - Ofertas Flash</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modo Oscuro Elegante */
        body { background-color: #0f172a; padding-bottom: 80px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        .header-ofertas { padding: 25px 20px; text-align: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 100;}
        .header-ofertas h2 { margin: 0; color: var(--pixar-orange); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.6rem; }
        .header-ofertas p { margin: 5px 0 0 0; font-size: 0.9rem; color: #94a3b8; }
        
        .ofertas-container { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Ajuste de barra inferior */
        .bottom-nav { background: white; border-top: none; }
    </style>
</head>
<body>

    <div class="header-ofertas">
        <h2><span class="material-symbols-outlined" style="font-size: 2rem;">bolt</span> Ofertas Flash</h2>
        <p>Aprovecha estas promociones exclusivas. ¡Se agotan rápido!</p>
    </div>

    <div class="ofertas-container" id="ofertasFlashContenedor">
        <div style="text-align:center; padding:40px; color:#64748b;">
            <span class="material-symbols-outlined" style="font-size: 3rem; animation: spin 2s linear infinite;">sync</span>
            <p>Buscando las mejores ofertas...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">home</span>Inicio</a>
        <a href="mapa-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">search</span>Buscar</a>
        <a href="ofertas-paciente.html" class="nav-item-bottom active"><span class="material-symbols-outlined">play_circle</span>Ofertas/Reels</a>
        <a href="citas-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">calendar_month</span>Citas</a>
        <a href="perfil-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">person</span>Perfil</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            cargarOfertas();
        });

        async function cargarOfertas() {
            const contenedor = document.getElementById('ofertasFlashContenedor');
            try {
               // 1. Llamada a Supabase (trae ofertas y datos del doctor al mismo tiempo)
const { data: ofertas, error } = await window.midental
    .from('ofertas_flash')
    .select('*, perfiles_dentistas(prefijo, nombre_completo)')
    .lte('inicio_at', new Date().toISOString())
    .order('created_at', { ascending: false });

                if (error) throw error;

                // 2. ¿Hay ofertas?
                if (!ofertas || ofertas.length === 0) {
                    contenedor.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5; color:white;">No hay ofertas flash activas en este momento.</div>`;
                    return;
                }

                // 3. Pintar ofertas
                contenedor.innerHTML = "";
                ofertas.forEach(oferta => {
                    const dr = oferta.perfiles_dentistas || {};
                    const drName = `${dr.prefijo || 'Dr.'} ${dr.nombre_completo || 'Especialista'}`;
                    
                    // Si no tiene imagen cargada, le ponemos un fondo bonito de reemplazo
                    const imgUrl = oferta.imagen_url || 'https://via.placeholder.com/400x200/1e293b/00b4d8?text=Promo+Especial';
                    
                    contenedor.innerHTML += `
                        <div class="offer-card" style="background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:15px; overflow:hidden; margin-bottom:15px;">
                            <img src="${imgUrl}" style="width:100%; height:160px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/400x200/1e293b/00b4d8?text=Promo+Especial'">
                            <div style="padding:15px;">
                                <span style="background:var(--pixar-orange); color:white; padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold;">DESTACADO</span>
                                <h3 style="margin:10px 0 5px 0; color:white; font-size:1.1rem;">${oferta.servicio_nombre}</h3>
                                <p style="margin:0 0 10px 0; color:#aaa; font-size:0.85rem;">Por ${drName}</p>
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="text-decoration:line-through; color:#888;">$${(oferta.precio_real || 0).toLocaleString('es-CL')}</span>
                                    <span style="color:var(--pixar-orange); font-size:1.3rem; font-weight:bold;">$${(oferta.precio_oferta || 0).toLocaleString('es-CL')}</span>
                                </div>
                                <button class="btn-pixar btn-outline mt-15" style="width:100%; border-radius:10px;" onclick="window.location.href='mapa-paciente.html'">Ver en el Mapa</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error al cargar ofertas:", err);
                contenedor.innerHTML = `<p style="color:red; text-align:center;">Ocurrió un error al cargar las promociones.</p>`;
            }
        }
    </script>
</body>
</html>
