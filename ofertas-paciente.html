<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiDental - Ofertas Flash</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modo Oscuro para destacar las imágenes de promociones */
        body { background-color: #0f172a; padding-bottom: 80px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        .header-ofertas { padding: 25px 20px; text-align: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 100;}
        .header-ofertas h2 { margin: 0; color: var(--pixar-orange); display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.6rem; }
        .header-ofertas p { margin: 5px 0 0 0; font-size: 0.9rem; color: #94a3b8; }
        
        .ofertas-container { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Ajuste de la barra inferior para que combine con el fondo oscuro, pero siga siendo blanca */
        .bottom-nav { background: white; border-top: none; }
    </style>
</head>
<body>

    <div class="header-ofertas">
        <h2><span class="material-symbols-outlined" style="font-size: 2rem;">bolt</span> Ofertas Flash</h2>
        <p>Aprovecha estas promociones exclusivas. ¡Se agotan rápido!</p>
    </div>

    <div class="ofertas-container" id="ofertasFlashContenedor">
        <div style="text-align:center; padding:40px; color:#64748b;">
            <span class="material-symbols-outlined" style="font-size: 3rem; animation: spin 2s linear infinite;">sync</span>
            <p>Buscando las mejores ofertas...</p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">home</span>Inicio</a>
        <a href="mapa-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">search</span>Buscar</a>
        <a href="ofertas-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">play_circle</span>Ofertas/Reels</a>
        <a href="citas-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">calendar_month</span>Citas</a>
        <a href="documentos-paciente.html" class="nav-item-bottom active"><span class="material-symbols-outlined">description</span>Documentos</a>
        <a href="perfil-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">person</span>Perfil</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    <script src="js/mapa.js"></script>
</body>
</html>
