<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiDental - Ofertas y Reels</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modo Oscuro Elegante */
        body { background-color: #0f172a; padding-bottom: 80px; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; }
        
        .header-ofertas { padding: 25px 20px 0; text-align: center; border-bottom: 1px solid #1e293b; position: sticky; top: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); z-index: 100;}
        .header-ofertas h2 { margin: 0; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 1.6rem; }
        
        /* Selector de Pestañas (Tabs) */
        .tabs-container { display: flex; justify-content: center; margin-top: 20px; gap: 10px; }
        .tab-btn { background: transparent; border: none; color: #94a3b8; font-size: 1rem; font-weight: bold; padding: 10px 20px; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; display: flex; align-items: center; gap: 5px; }
        .tab-btn.active { color: var(--pixar-cyan); border-bottom-color: var(--pixar-cyan); }
        .tab-btn:hover { color: white; }

        .content-area { padding: 20px; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
        
        /* Ajuste de barra inferior */
        .bottom-nav { background: white; border-top: none; }

        /* Animación Cronómetro Ofertas */
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); opacity: 0.8; color: #ef4444; }
            100% { transform: scale(1); }
        }
        .reloj-urgencia { animation: latido 1.5s infinite; }

        /* Estilos Reels (Shorts) */
        .reel-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.2); margin-bottom: 20px; }
        .reel-video-container { width: 100%; aspect-ratio: 9/16; background: #000; position: relative; }
        .reel-video-container iframe { width: 100%; height: 100%; border: none; }
        .reel-info { padding: 15px; }
        .reel-dr { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .reel-dr img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--pixar-cyan); object-fit: cover;}
    </style>
</head>
<body>

    <div class="header-ofertas">
        <h2>Explora MiDental</h2>
        
        <div class="tabs-container">
            <button class="tab-btn active" id="btnTabOfertas" onclick="cambiarPestana('ofertas')">
                <span class="material-symbols-outlined">bolt</span> Ofertas Flash
            </button>
            <button class="tab-btn" id="btnTabReels" onclick="cambiarPestana('reels')">
                <span class="material-symbols-outlined">play_circle</span> Reels Clínicos
            </button>
        </div>
    </div>

    <div class="content-area" id="areaOfertas">
        <div id="ofertasFlashContenedor">
            <div style="text-align:center; padding:40px; color:#64748b;">
                <span class="material-symbols-outlined" style="font-size: 3rem; animation: spin 2s linear infinite;">sync</span>
                <p>Buscando las mejores ofertas...</p>
            </div>
        </div>
    </div>

    <div class="content-area" id="areaReels" style="display: none;">
        <div id="reelsContenedor">
            <div style="text-align:center; padding:40px; color:#64748b;">
                <span class="material-symbols-outlined" style="font-size: 3rem; animation: spin 2s linear infinite;">sync</span>
                <p>Cargando videos educativos...</p>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="dashboard-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">home</span>Inicio</a>
        <a href="mapa-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">search</span>Buscar</a>
        <a href="ofertas-paciente.html" class="nav-item-bottom active"><span class="material-symbols-outlined">play_circle</span>Ofertas/Reels</a>
        <a href="citas-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">calendar_month</span>Citas</a>
        <a href="documentos-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">description</span>Documentos</a>
        <a href="perfil-paciente.html" class="nav-item-bottom"><span class="material-symbols-outlined">person</span>Perfil</a>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-config.js"></script>
    <script src="js/app.js"></script>
    
    <script>
        let cronometroGlobalInterval;

        document.addEventListener('DOMContentLoaded', () => {
            cargarOfertas();
            cargarReels();
        });

        // 1. SISTEMA DE PESTAÑAS (TABS)
        function cambiarPestana(pestana) {
            document.getElementById('btnTabOfertas').classList.toggle('active', pestana === 'ofertas');
            document.getElementById('btnTabReels').classList.toggle('active', pestana === 'reels');
            
            document.getElementById('areaOfertas').style.display = pestana === 'ofertas' ? 'flex' : 'none';
            document.getElementById('areaReels').style.display = pestana === 'reels' ? 'flex' : 'none';
        }

        // 2. CARGAR OFERTAS FLASH
        async function cargarOfertas() {
            const contenedor = document.getElementById('ofertasFlashContenedor');
            try {
                const { data: ofertas, error } = await window.midental
                    .from('ofertas_flash')
                    .select('*, perfiles_dentistas(prefijo, nombre_completo)')
                    .lte('inicio_at', new Date().toISOString()) 
                    .gte('expira_at', new Date().toISOString()) 
                    .eq('activa', true) 
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!ofertas || ofertas.length === 0) {
                    contenedor.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5; color:white;">No hay ofertas flash activas en este momento. Vuelve más tarde.</div>`;
                    return;
                }

                contenedor.innerHTML = "";
                ofertas.forEach(oferta => {
                    const dr = oferta.perfiles_dentistas || {};
                    const nombreBase = dr.nombre_completo || '';
                    if (!nombreBase) return; // Evita mostrar ofertas de doctores eliminados

                    const drName = `${dr.prefijo || 'Dr.'} ${nombreBase}`;
                    const imgUrl = oferta.imagen_url || 'https://via.placeholder.com/400x200/1e293b/00b4d8?text=Promo+Especial';
                    
                    let porcentajeDesc = 0;
                    if(oferta.precio_real > 0) {
                        porcentajeDesc = Math.round(((oferta.precio_real - oferta.precio_oferta) / oferta.precio_real) * 100);
                    }

                    contenedor.innerHTML += `
                        <div class="offer-card" style="position: relative; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:15px; overflow:hidden; margin-bottom:15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);">
                            
                            <div style="position: absolute; top: 15px; right: 15px; background: #ef4444; color: white; padding: 8px 15px; border-radius: 20px; font-weight: 900; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10;">
                                -${porcentajeDesc}%
                            </div>

                            <img src="${imgUrl}" style="width:100%; height:180px; object-fit:cover;" onerror="this.src='https://via.placeholder.com/400x200/1e293b/00b4d8?text=Promo+Especial'">
                            
                            <div style="padding:15px;">
                                <div style="display:flex; justify-content:space-between; align-items:center;">
                                    <span style="background:var(--pixar-orange); color:white; padding:3px 8px; border-radius:10px; font-size:0.7rem; font-weight:bold;">DESTACADO</span>
                                    
                                    <div class="timer-container" data-expira="${oferta.expira_at}" style="display:flex; align-items:center; gap:5px; color:var(--pixar-orange); font-size:0.85rem; font-weight:bold; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 12px;">
                                        <span class="material-symbols-outlined reloj-urgencia" style="font-size:1.1rem;">timer</span>
                                        <span class="tiempo-restante">Calculando...</span>
                                    </div>
                                </div>
                                
                                <h3 style="margin:12px 0 5px 0; color:white; font-size:1.2rem;">${oferta.servicio_nombre}</h3>
                                <p style="margin:0 0 15px 0; color:#94a3b8; font-size:0.9rem;">Por ${drName}</p>
                                
                                <div style="display:flex; justify-content:space-between; align-items:center; background: rgba(0,0,0,0.2); padding: 10px 15px; border-radius: 12px;">
                                    <div style="display:flex; flex-direction:column;">
                                        <span style="font-size:0.75rem; color:#888;">Precio Normal</span>
                                        <span style="text-decoration:line-through; color:#94a3b8; font-size:0.9rem;">$${(oferta.precio_real || 0).toLocaleString('es-CL')}</span>
                                    </div>
                                    <div style="display:flex; flex-direction:column; text-align:right;">
                                        <span style="font-size:0.75rem; color:var(--pixar-orange); font-weight:bold;">Precio Oferta</span>
                                        <span style="color:var(--pixar-orange); font-size:1.5rem; font-weight:900;">$${(oferta.precio_oferta || 0).toLocaleString('es-CL')}</span>
                                    </div>
                                </div>
                                
                                <button class="btn-pixar btn-outline mt-15" style="width:100%; border-radius:12px; padding: 12px; font-size: 1rem; border-width: 2px;" onclick="window.location.href='mapa-paciente.html?doctor=${encodeURIComponent(nombreBase)}'">
                                    Agendar con este precio
                                </button>
                            </div>
                        </div>
                    `;
                });

                // Iniciar el motor de tiempo real para todas las ofertas renderizadas
                iniciarCronometrosEnVivo();

            } catch (err) {
                console.error("Error al cargar ofertas:", err);
                contenedor.innerHTML = `<p style="color:red; text-align:center;">Ocurrió un error al cargar las promociones.</p>`;
            }
        }

        // MOTOR DE CRONÓMETROS EN TIEMPO REAL
        function iniciarCronometrosEnVivo() {
            clearInterval(cronometroGlobalInterval);
            cronometroGlobalInterval = setInterval(() => {
                document.querySelectorAll('.timer-container').forEach(el => {
                    const expiraDate = new Date(el.dataset.expira).getTime();
                    const ahora = new Date().getTime();
                    const diffMs = expiraDate - ahora;

                    if (diffMs <= 0) {
                        el.querySelector('.tiempo-restante').innerText = "¡Finalizada!";
                        el.style.color = "#ef4444";
                        return;
                    }
                    
                    const horasTotales = Math.floor(diffMs / (1000 * 60 * 60));
                    const dias = Math.floor(horasTotales / 24);
                    const horasSueltas = horasTotales % 24;
                    const minutos = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
                    const segundos = Math.floor((diffMs % (1000 * 60)) / 1000);

                    if (dias > 0) {
                        el.querySelector('.tiempo-restante').innerText = `Termina en ${dias}d y ${horasSueltas}h`;
                    } else {
                        el.querySelector('.tiempo-restante').innerText = `¡${horasTotales.toString().padStart(2,'0')}:${minutos.toString().padStart(2,'0')}:${segundos.toString().padStart(2,'0')}!`;
                    }
                });
            }, 1000);
        }

        // 3. CARGAR REELS (SHORTS) - VERSIÓN INTELIGENTE
        async function cargarReels() {
            const contenedor = document.getElementById('reelsContenedor');
            try {
                const { data: videos, error } = await window.midental
                    .from('shorts_videos')
                    .select('*, perfiles_dentistas(prefijo, nombre_completo, avatar_url)')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                if (!videos || videos.length === 0) {
                    contenedor.innerHTML = `<div style="text-align:center; padding:30px; opacity:0.5; color:white;">No hay Reels clínicos disponibles aún.</div>`;
                    return;
                }

                contenedor.innerHTML = "";
                videos.forEach(vid => {
                    const dr = vid.perfiles_dentistas || {};
                    const nombreBase = dr.nombre_completo || '';
                    if (!nombreBase) return; // Validación de integridad

                    const drName = `${dr.prefijo || 'Dr.'} ${nombreBase}`;
                    const drAvatar = dr.avatar_url || 'assets/avatar-default-doctor.png';
                    
                    let embedUrl = "";
                    let urlOriginal = vid.video_url || "";
                    let videoId = "";

                    if (urlOriginal.includes('youtube.com/shorts/')) {
                        videoId = urlOriginal.split('shorts/')[1].split('?')[0];
                    } else if (urlOriginal.includes('youtu.be/')) {
                        videoId = urlOriginal.split('youtu.be/')[1].split('?')[0];
                    } else if (urlOriginal.includes('youtube.com/watch')) {
                        try { videoId = new URLSearchParams(urlOriginal.split('?')[1]).get('v'); } catch(e){}
                    }

                    if (videoId) {
                        embedUrl = `https://www.youtube.com/embed/${videoId}`;
                    }

                    contenedor.innerHTML += `
                        <div class="reel-card">
                            ${embedUrl ? `
                                <div class="reel-video-container">
                                    <iframe src="${embedUrl}" title="Video reproductor" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                                </div>
                            ` : `
                                <div style="padding: 40px 20px; text-align:center; background:#1e293b; color:#94a3b8; border-bottom: 1px solid rgba(255,255,255,0.05);">
                                    <span class="material-symbols-outlined" style="font-size: 3.5rem; margin-bottom: 10px; color: #475569;">ondemand_video</span><br>
                                    <p style="margin-top:0; margin-bottom: 15px; font-size: 0.95rem;">El formato de este video requiere abrirse en su aplicación original.</p>
                                    <a href="${urlOriginal}" target="_blank" style="color: white; font-weight: bold; text-decoration: none; padding: 10px 20px; background: var(--pixar-cyan); border-radius: 8px; display: inline-flex; align-items: center; gap: 5px;">
                                        <span class="material-symbols-outlined" style="font-size: 1.1rem;">open_in_new</span> Ver video original
                                    </a>
                                </div>
                            `}
                            
                            <div class="reel-info">
                                <div class="reel-dr">
                                    <img src="${drAvatar}" alt="Doctor">
                                    <div>
                                        <h4 style="margin: 0; color: white; font-size: 1rem;">${drName}</h4>
                                        <span style="font-size: 0.75rem; color: #94a3b8;">${vid.cta_tipo === 'agendar' ? 'Disponible para Agendar' : 'Video Educativo'}</span>
                                    </div>
                                </div>
                                <p style="margin: 0 0 15px 0; color: #cbd5e1; font-size: 0.9rem; line-height: 1.4;">${vid.descripcion || 'Sin descripción.'}</p>
                                
                                <button class="btn-pixar" style="width: 100%; border-radius: 12px; padding: 12px; font-weight: bold;" onclick="window.location.href='mapa-paciente.html?doctor=${encodeURIComponent(nombreBase)}'">
                                    Agendar con ${dr.prefijo || 'Dr.'} ${nombreBase.split(' ')[0]}
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error("Error al cargar Reels:", err);
                contenedor.innerHTML = `<p style="color:red; text-align:center;">Ocurrió un error al cargar los videos.</p>`;
            }
        }
    </script>
</body>
</html>
